<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic MapLibre Viewer</title>

    <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet" />

    <style>
      body { margin: 0; padding: 0; font-family: system-ui, -apple-system, sans-serif; }
      #map { position: absolute; top: 0; bottom: 0; width: 100%; background: #eee; }

      .control-panel {
        position: absolute;
        top: 15px;
        left: 15px;
        background: white;
        padding: 15px;
        border-radius: 8px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        z-index: 10;
        width: 280px;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .section { display: flex; flex-direction: column; gap: 5px; }
      label { font-size: 12px; font-weight: bold; color: #555; text-transform: uppercase; }

      input, select, button {
        padding: 8px;
        border-radius: 4px;
        border: 1px solid #ccc;
        font-size: 14px;
      }

      button {
        background-color: #0078ff;
        color: white;
        border: none;
        cursor: pointer;
        font-weight: bold;
      }

      button:hover { background-color: #0056b3; }

      #status { font-size: 12px; color: #666; }
      .error { color: #d32f2f !important; }
    </style>
</head>
<body>

<div class="control-panel">
    <div class="section">
        <label for="server-url">Map Server or Style URL</label>
        <input type="text" id="server-url" placeholder="https://map.example.org">
        <button id="connect-btn">Load Map</button>
    </div>

    <div class="section">
        <label for="style-selector">Available Styles</label>
        <select id="style-selector">
            <option value="">-- Connect to server first --</option>
        </select>
    </div>

    <div id="status">Ready.</div>
</div>

<div id="map"></div>

<script>
    const serverInput = document.getElementById('server-url');
    const connectBtn = document.getElementById('connect-btn');
    const styleSelector = document.getElementById('style-selector');
    const statusText = document.getElementById('status');

    let map;

    // Read URL parameter on page load ---
    const urlParams = new URLSearchParams(window.location.search);
    const urlParam = urlParams.get('url');
    if (urlParam) {
        serverInput.value = urlParam;
    }

    // Update browser URL dynamically ---
    function updateUrlParameter(url) {
        const newUrl = new URL(window.location);
        if (url) {
            newUrl.searchParams.set('url', url);
        } else {
            newUrl.searchParams.delete('url');
        }
        window.history.pushState({}, '', newUrl);
    }

    /**
     * Fetches either a styles.json list or a single style.json object
     */
    async function fetchStyles(inputUrl) {
        if (!inputUrl) return;

        updateUrlParameter(inputUrl); // Save to URL params for sharing

        // Smart endpoint detection
        let endpoint = inputUrl;
        try {
            const parsed = new URL(inputUrl);
            // If it's a bare domain/path without a file extension or query params, assume it's a server base and append /styles.json
            if (!parsed.pathname.endsWith('.json') && parsed.search === '') {
                endpoint = inputUrl.replace(/\/$/, "") + '/styles.json';
            }
        } catch (e) {
            console.warn("Invalid URL format entered.");
        }

        statusText.innerText = "Connecting...";
        statusText.classList.remove('error');

        try {
            const response = await fetch(endpoint);
            if (!response.ok) throw new Error(`HTTP Error: ${response.status}`);

            const data = await response.json();

            if (Array.isArray(data)) {
                // Handle as a list of styles (styles.json)
                data.forEach((style) => {
                    if (style.url) style.url = style.url.replace("[LANG]", "");
                });
                updateStyleDropdown(data);
                statusText.innerText = `Found ${data.length} styles.`;

                if (data.length > 0) {
                    applyStyle(data[0].url);
                }
            } else if (typeof data === 'object' && data.version) {
                // Handle as a single style.json file
                const styleName = data.name || "Custom Single Style";
                updateStyleDropdown([{ id: styleName, url: endpoint }]);
                statusText.innerText = `Loaded single style.`;
                applyStyle(endpoint);
            } else {
                throw new Error("Unrecognized JSON format (not a valid style or style list).");
            }

        } catch (err) {
            statusText.innerText = "Error: Could not fetch map data.";
            statusText.classList.add('error');
            console.error(err);
        }
    }

    /**
     * Updates the UI dropdown with the list of style URLs
     */
    function updateStyleDropdown(styles) {
        styleSelector.innerHTML = ''; // Clear current options
        styles.forEach(jsonStyle => {
            const opt = document.createElement('option');
            opt.value = jsonStyle.url;
            opt.textContent = jsonStyle.id || jsonStyle.name;
            styleSelector.appendChild(opt);
        });
    }

    /**
     * Updates the map style
     */
    function applyStyle(styleUrl) {
        console.log("Apply style:", styleUrl);
        if (!map) {
            // First time initialization
            map = new maplibregl.Map({
                container: 'map',
                style: styleUrl,
                center: [0, 20],
                zoom: 2
            });
            map.addControl(new maplibregl.NavigationControl(), 'top-right');
        } else {
            // Update existing map
            map.setStyle(styleUrl);
        }
    }

    // Event Listeners
    connectBtn.addEventListener('click', () => {
        fetchStyles(serverInput.value);
    });

    serverInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') fetchStyles(serverInput.value);
    });

    styleSelector.addEventListener('change', (e) => {
        if (e.target.value) applyStyle(e.target.value);
    });

    // Initial load if an input value is present
    if (serverInput.value) {
        fetchStyles(serverInput.value);
    }
</script>

</body>
</html>
